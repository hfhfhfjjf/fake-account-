name: Find Fake Users (Dry Run)

# Yeh trigger allow karega ke aap is action ko GitHub Actions tab se manually run kar sakein
on: 
  workflow_dispatch:

jobs:
  scan_users:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Firebase Admin SDK
      run: npm install firebase-admin

    - name: Run Script to Find Fake Users
      env:
        # Secret key jo hum GitHub mein add karenge
        FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
      run: node find_fake_users.js
      
